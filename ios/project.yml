name: TrueMatch
options:
  bundleIdPrefix: ai.truematch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_LANGUAGE: en
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  TrueMatch:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TrueMatch
        excludes:
          - "Preview Content/**"
      - path: TrueMatch/Preview Content
        buildPhase: sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.truematch.app
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        ENABLE_PREVIEWS: true
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: TrueMatch/TrueMatch.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: TrueMatch/Info.plist
      properties:
        CFBundleDisplayName: TrueMatch
        UILaunchScreen: {}
        CFBundleURLTypes:
          - CFBundleURLName: ai.truematch.app
            CFBundleURLSchemes:
              - truematch
        NSMicrophoneUsageDescription: TrueMatch uses the microphone so you can dictate messages to the AI assistant.
        NSSpeechRecognitionUsageDescription: TrueMatch transcribes your voice on-device to fill the message field.
        UIBackgroundModes:
          - remote-notification
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - ai.truematch.app.sync
          - ai.truematch.app.maintenance
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
