name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # CI runs with encryption + governance configured so the full paths exercise.
      LLM_FORCE_MOCK: "true"
      ENCRYPTION_KEY: "MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE="
      GOVERNANCE_COHERENCE_THRESHOLD: "0.7"
      GOVERNANCE_CONSISTENCY_BOUND: "0.25"
      GOVERNANCE_FIDELITY_THRESHOLD: "0.9"
      GOVERNANCE_COUNTER_REC_DELTA: "25"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Tests (pytest, incl. Dockerized Postgres e2e)
        run: pytest -q

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci || npm install
      - name: Build
        run: npm run build
