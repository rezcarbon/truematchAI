# TrueMatch AI - Production Kubernetes Deployment
# Phase 3: Production Deployment Automation
#
# This manifest defines the complete production deployment configuration
# including all services, configurations, and monitoring infrastructure.

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: truematch-prod
  labels:
    environment: production
    version: v1

---
# ConfigMap - Production Environment Variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: truematch-prod-config
  namespace: truematch-prod
  labels:
    app: truematch
    component: configuration
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  DEBUG: "false"
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  DATABASE_POOL_SIZE: "20"
  DATABASE_POOL_TIMEOUT: "30"
  DATABASE_MAX_OVERFLOW: "40"
  REDIS_POOL_SIZE: "50"
  CACHE_TTL: "3600"
  API_RATE_LIMIT: "100"
  API_RATE_LIMIT_WINDOW: "60"
  QUERY_TIMEOUT: "30"
  SENTRY_ENABLED: "true"
  SENTRY_TRACES_SAMPLE_RATE: "0.1"
  PROMETHEUS_METRICS_ENABLED: "true"
  STRUCTURED_LOGGING_ENABLED: "true"
  METRICS_PORT: "8001"
  HEALTH_CHECK_ENABLED: "true"

---
# Secret - Production Secrets (should be managed via sealed-secrets or external-secrets in production)
apiVersion: v1
kind: Secret
metadata:
  name: truematch-prod-secrets
  namespace: truematch-prod
  labels:
    app: truematch
    component: secrets
type: Opaque
stringData:
  # NOTE: Replace with actual production secrets
  DATABASE_USER: "truematch_prod"
  DATABASE_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  DATABASE_NAME: "truematch_prod"
  REDIS_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"
  SECRET_KEY: "REPLACE_WITH_SECURE_SECRET_KEY"
  SENTRY_DSN: "REPLACE_WITH_SENTRY_DSN"
  JWT_SECRET: "REPLACE_WITH_SECURE_JWT_SECRET"
  ENCRYPTION_KEY: "REPLACE_WITH_SECURE_ENCRYPTION_KEY"

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: truematch-prod
  namespace: truematch-prod
  labels:
    app: truematch

---
# Role - RBAC for production
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: truematch-prod-role
  namespace: truematch-prod
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: truematch-prod-rolebinding
  namespace: truematch-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: truematch-prod-role
subjects:
- kind: ServiceAccount
  name: truematch-prod
  namespace: truematch-prod

---
# API Deployment - Production
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: truematch-prod
  labels:
    app: api
    version: v1
    environment: production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        version: v1
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
        prometheus.io/interval: "30s"
    spec:
      serviceAccountName: truematch-prod
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      terminationGracePeriodSeconds: 45
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - api
              topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 50
            preference:
              matchExpressions:
              - key: node-type
                operator: In
                values:
                - production
      containers:
      - name: api
        image: truematch-api:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        - containerPort: 8001
          name: metrics
          protocol: TCP
        envFrom:
        - configMapRef:
            name: truematch-prod-config
        - secretRef:
            name: truematch-prod-secrets
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://$(DATABASE_USER):$(DATABASE_PASSWORD)@postgres-prod:5432/$(DATABASE_NAME)"
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@redis-prod:6379/0"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: singpass-keys
          mountPath: /etc/secrets/singpass
          readOnly: true
        - name: app-logs
          mountPath: /var/log/app
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
            ephemeral-storage: "1Gi"
          limits:
            memory: "1Gi"
            cpu: "1000m"
            ephemeral-storage: "2Gi"
        livenessProbe:
          httpGet:
            path: /livez
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /livez
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 2
          timeoutSeconds: 1
          failureThreshold: 30
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 1Gi
      - name: singpass-keys
        secret:
          secretName: truematch-singpass-keys
          optional: true
          defaultMode: 0400
      - name: app-logs
        emptyDir:
          sizeLimit: 2Gi

---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: truematch-prod
  labels:
    app: api
  annotations:
    prometheus.io/scrape: "true"
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 8001
    targetPort: 8001
    protocol: TCP
    name: metrics
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
# API PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-pdb
  namespace: truematch-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api

---
# Worker Deployment - Production
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: truematch-prod
  labels:
    app: worker
    version: v1
    environment: production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        version: v1
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: truematch-prod
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - worker
              topologyKey: kubernetes.io/hostname
      containers:
      - name: worker
        image: truematch-api:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "app.worker"]
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 8001
          name: metrics
          protocol: TCP
        envFrom:
        - configMapRef:
            name: truematch-prod-config
        - secretRef:
            name: truematch-prod-secrets
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://$(DATABASE_USER):$(DATABASE_PASSWORD)@postgres-prod:5432/$(DATABASE_NAME)"
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@redis-prod:6379/0"
        - name: WORKER_CONCURRENCY: "4"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: app-logs
          mountPath: /var/log/app
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
            ephemeral-storage: "1Gi"
          limits:
            memory: "2Gi"
            cpu: "2000m"
            ephemeral-storage: "2Gi"
        livenessProbe:
          httpGet:
            path: /livez
            port: 8001
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 1Gi
      - name: app-logs
        emptyDir:
          sizeLimit: 2Gi

---
# Worker Service
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: truematch-prod
  labels:
    app: worker
spec:
  type: ClusterIP
  selector:
    app: worker
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
    name: metrics

---
# Worker PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: worker-pdb
  namespace: truematch-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: worker

---
# Scheduler (Celery Beat) Deployment - Production
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: truematch-prod
  labels:
    app: scheduler
    version: v1
    environment: production
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
        version: v1
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: truematch-prod
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      terminationGracePeriodSeconds: 60
      containers:
      - name: scheduler
        image: truematch-api:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "app.scheduler"]
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        ports:
        - containerPort: 8001
          name: metrics
          protocol: TCP
        envFrom:
        - configMapRef:
            name: truematch-prod-config
        - secretRef:
            name: truematch-prod-secrets
        env:
        - name: DATABASE_URL
          value: "postgresql+asyncpg://$(DATABASE_USER):$(DATABASE_PASSWORD)@postgres-prod:5432/$(DATABASE_NAME)"
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@redis-prod:6379/0"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /livez
            port: 8001
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: tmp
        emptyDir:
          sizeLimit: 1Gi

---
# Scheduler Service
apiVersion: v1
kind: Service
metadata:
  name: scheduler
  namespace: truematch-prod
  labels:
    app: scheduler
spec:
  type: ClusterIP
  selector:
    app: scheduler
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
    name: metrics

---
# NetworkPolicy - Production security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: truematch-prod-network-policy
  namespace: truematch-prod
spec:
  podSelector:
    matchLabels:
      app: truematch
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53

---
# HorizontalPodAutoscaler - API
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: truematch-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
# HorizontalPodAutoscaler - Worker
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
  namespace: truematch-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
