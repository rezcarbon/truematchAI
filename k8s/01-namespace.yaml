apiVersion: v1
kind: Namespace
metadata:
  name: truematch
  labels:
    app: truematch
    environment: production

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: truematch
  namespace: truematch
  labels:
    app: truematch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: truematch
  labels:
    app: truematch
rules:
  # ConfigMaps and Secrets
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  # Pods for status checks
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  # Services for discovery
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
  # Jobs and CronJobs
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: truematch
  labels:
    app: truematch
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: truematch
subjects:
  - kind: ServiceAccount
    name: truematch
    namespace: truematch
